<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Entregas - JD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  /* ===== FUNDO ===== */
  body{
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:url("fundo.jpg") no-repeat center center fixed;
    background-size:cover;
    color:#fff;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 30% 12%, rgba(33,150,243,0.18), transparent 45%),
      radial-gradient(circle at 80% 35%, rgba(76,175,80,0.10), transparent 45%),
      rgba(0,0,0,0.22);
    z-index:-1;
  }

  .container{
    max-width:1100px;
    margin:auto;
    padding:26px 18px 40px;
  }

  /* ===== TOPO ===== */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:14px;
  }
  .title{
    margin:0;
    font-size:34px;
    font-weight:900;
    letter-spacing:.2px;
  }
  .top-actions{
    display:flex;
    gap:10px;
    align-items:center;
  }
  .btn-pill{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:10px 14px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.18);
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(12px);
    cursor:pointer;
    color:#fff;
    font-weight:900;
    transition:.25s ease;
    user-select:none;
  }
  .btn-pill:hover{ transform:translateY(-1px); background:rgba(255,255,255,0.12); }

  /* ===== FILTROS ===== */
  .filters{
    display:grid;
    grid-template-columns: 1fr 1fr 1.2fr;
    gap:10px;
    margin:12px 0 12px;
  }
  .control{
    border:1px solid rgba(255,255,255,0.16);
    background:rgba(0,0,0,0.22);
    color:#fff;
    border-radius:14px;
    padding:12px 14px;
    outline:none;
    font-weight:900;
    backdrop-filter:blur(10px);
  }
  .control::placeholder{ color: rgba(255,255,255,0.55); font-weight:800; }

  /* ===== ABAS (ADMIN) ===== */
  .tabs{
    display:none; /* aparece só pro Jader via JS */
    gap:10px;
    margin:0 0 18px;
  }
  .tab{
    flex:1;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.16);
    background:rgba(0,0,0,0.18);
    color:#fff;
    font-weight:1000;
    cursor:pointer;
    transition:.2s ease;
    text-align:center;
    user-select:none;
  }
  .tab:hover{ transform: translateY(-1px); background:rgba(255,255,255,0.10); }
  .tab.active{
    background: rgba(33,150,243,0.22);
    border-color: rgba(33,150,243,0.35);
  }

  /* ===== ZONAS (layout horizontal) ===== */
  .zone-wrap{
    margin:14px 0;
    border:1px solid rgba(255,255,255,0.14);
    background: rgba(0,0,0,0.16);
    border-radius:18px;
    overflow:hidden;
    backdrop-filter: blur(14px);
    box-shadow:0 18px 46px rgba(0,0,0,0.35);
  }
  .zone-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 16px;
    background: rgba(0,0,0,0.18);
    border-bottom: 1px solid rgba(255,255,255,0.10);
    gap:10px;
  }
  .zone-title{
    font-weight:1000;
    letter-spacing:.3px;
    font-size:18px;
  }
  .zone-count{
    opacity:.9;
    font-weight:900;
    white-space:nowrap;
  }

  .zone-row{
    display:flex;
    gap:12px;
    padding:14px;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .zone-row::-webkit-scrollbar{ height:10px; }
  .zone-row::-webkit-scrollbar-thumb{
    background: rgba(255,255,255,0.18);
    border-radius: 999px;
  }
  .zone-row::-webkit-scrollbar-track{
    background: rgba(0,0,0,0.18);
    border-radius: 999px;
  }

  /* ===== CARD ===== */
  .card{
    flex: 0 0 360px;
    max-width: 360px;
    border:1px solid rgba(255,255,255,0.14);
    background: rgba(0,0,0,0.20);
    border-radius:18px;
    padding:14px 14px 12px;
    box-shadow:0 10px 26px rgba(0,0,0,0.35);
    scroll-snap-align:start;
  }
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
  }
  .pedido{
    margin:0 0 6px;
    font-size:18px;
    font-weight:1000;
  }
  .pill{
    padding:8px 12px;
    border-radius:999px;
    font-weight:1000;
    border:1px solid rgba(255,255,255,0.18);
    background: rgba(0,0,0,0.25);
    white-space:nowrap;
  }
  .pill.em_entrega{ border-color: rgba(33,150,243,0.35); }
  .pill.entregue{ border-color: rgba(76,175,80,0.40); }

  .line{
    margin:6px 0;
    font-weight:850;
    opacity:.96;
  }
  .muted{ opacity:.75; font-weight:800; }

  .actions{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
    margin-top:12px;
  }
  .btn{
    padding:12px 14px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.16);
    background:rgba(0,0,0,0.18);
    color:#fff;
    font-weight:1000;
    cursor:pointer;
    transition:.2s ease;
  }
  .btn:hover{ transform: translateY(-1px); background:rgba(255,255,255,0.10); }
  .btn.primary{
    background: rgba(76,175,80,0.25);
    border-color: rgba(76,175,80,0.35);
  }

  .btn-row{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
    margin-top:10px;
  }

  .empty{
    padding:16px;
    opacity:.85;
    font-weight:900;
    text-align:center;
  }

  @media (max-width: 820px){
    .title{ font-size:28px; }
    .filters{ grid-template-columns: 1fr; }
    .actions{ grid-template-columns: 1fr; }
    .btn-row{ grid-template-columns: 1fr; }
    .tabs{ flex-direction:column; }
    .card{ flex-basis: 84vw; max-width: 84vw; }
  }
</style>
</head>

<body>
<div class="container">

  <div class="topbar">
    <h1 class="title">Entregas</h1>
    <div class="top-actions">
      <button id="btnVoltar" class="btn-pill" type="button" onclick="location.href='jader.html'">Voltar</button>
      <button id="btnSair" class="btn-pill" type="button">Sair</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs, query, where, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlB4NN_lTrWv4sJ1PKp2m0YjoVADnIeHk",
  authDomain: "crm-vendas-43b6b.firebaseapp.com",
  projectId: "crm-vendas-43b6b",
  storageBucket: "crm-vendas-43b6b.appspot.com",

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let vendasCache = [];
let roleAtual = "";                  // "entregador" | "jader"
let statusSelecionado = "em_entrega";// admin alterna aqui

const listaEl = document.getElementById("lista");
const zonaFiltro = document.getElementById("zonaFiltro");
const dataFiltro = document.getElementById("dataFiltro");
const buscaFiltro = document.getElementById("buscaFiltro");
const tabsStatus = document.getElementById("tabsStatus");
const btnVoltar = document.getElementById("btnVoltar");

function formatarZona(z){
  const map = {
    centro: "Centro",
    zona_norte: "Zona Norte",
    zona_sul: "Zona Sul",
    zona_leste: "Zona Leste",
    zona_oeste: "Zona Oeste",
    abc_paulista: "ABC Paulista",
    litoral_sul: "Litoral Sul",
    litoral_norte: "Litoral Norte",
    sudoeste: "Sudoeste",
    interior: "Interior"
  };
  return map[z] || (z ? String(z) : "-");
}

function moedaBRL(n){
  return Number(n || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function normalizarTexto(s){
  return String(s || "").toLowerCase().trim();
}

/* ====== ROLE: entregador OU jader (por /usuarios/{uid}.role) ====== */
async function validarRole(user){
  const ref = doc(db, "usuarios", user.uid);
  const snap = await getDoc(ref);
  if(!snap.exists()) return "";

  const data = snap.data();
  const role = String(data.role || "").toLowerCase();
  if (role === "entregador" || role === "jader") return role;
  return "";
}

function aplicarUIporRole(){
  if (roleAtual !== "jader"){
    if (btnVoltar) btnVoltar.style.display = "none";
    if (tabsStatus) tabsStatus.style.display = "none";
    statusSelecionado = "em_entrega";
  } else {
    if (tabsStatus) tabsStatus.style.display = "flex";
  }
}

/* ✅ AQUI É A PARTE QUE ESTAVA “FALTANDO” NO NOVO:
   Jader busca em_entrega + entregue
   Entregador busca só em_entrega
*/
async function carregarPedidosEntrega(){
  listaEl.innerHTML = `<div class="empty">Carregando...</div>`;

  let q;
  if (roleAtual === "jader"){
    q = query(collection(db, "vendas"), where("status", "in", ["em_entrega", "entregue"]));
  } else {
    q = query(collection(db, "vendas"), where("status", "==", "em_entrega"));
  }

  const snap = await getDocs(q);
  vendasCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  montarZonasNoSelect();
  render();
}

function montarZonasNoSelect(){
  const zonas = [...new Set(vendasCache.map(v => v.zona).filter(Boolean))].sort();
  zonaFiltro.innerHTML = `<option value="">Todas as Zonas</option>` +
    zonas.map(z => `<option value="${z}">${formatarZona(z)}</option>`).join("");
}

function aplicarFiltros(){
  const z = zonaFiltro.value;
  const d = dataFiltro.value;
  const b = normalizarTexto(buscaFiltro.value);

  return vendasCache.filter(v => {
    // status (só pro admin)
    if (roleAtual === "jader" && statusSelecionado){
      if (v.status !== statusSelecionado) return false;
    }

    if (z && v.zona !== z) return false;
    if (d && v.dataEntrega !== d) return false;

    if (b){
      const alvo = [
        v.pedido,
        v.cliente?.nome,
        v.cliente?.cidade,
        v.vendedorNome
      ].map(normalizarTexto).join(" ");
      if (!alvo.includes(b)) return false;
    }
    return true;
  });
}

function agruparPorZona(lista){
  const grupos = {};
  lista.forEach(v => {
    const z = v.zona || "sem_zona";
    if (!grupos[z]) grupos[z] = [];
    grupos[z].push(v);
  });
  return grupos;
}

function enderecoCompleto(v){
  const c = v.cliente || {};
  const partes = [ c.rua, c.numero, c.bairro, c.cidade, c.cep ].filter(Boolean);
  return partes.join(" - ");
}

function copiarTexto(texto){
  navigator.clipboard.writeText(texto || "")
    .then(()=>alert("Copiado!"))
    .catch(()=>alert("Não consegui copiar agora."));
}

function abrirMaps(v){
  const end = enderecoCompleto(v);
  const url = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(end);
  window.open(url, "_blank", "noopener");
}

/* impressão: mantive igual ao seu */

    </style>
  </head>
  <body>
    <div class="page">

      <div class="header">
        <img src="${logoSrc}" alt="Logo JD" class="logo">
        <div class="header-text">
          <div class="empresa">${empresa}</div>
          <div class="subtitulo">Comprovante de Pedido | Entrega</div>

      <hr class="linha-topo">

    </div>

    <script>
      window.onload = () => window.print();
    <\/script>
  </body>
  </html>
  `);

  w.document.close();
}
  
async function marcarEntregue(id){
  const ok = confirm("Confirmar: este pedido foi ENTREGUE?");
  if(!ok) return;

  await updateDoc(doc(db, "vendas", id), {
    status: "entregue",
    entregueEm: new Date().toISOString()
  });

  alert("Pedido marcado como entregue!");
  carregarPedidosEntrega();
}

function render(){
  const lista = aplicarFiltros();

  if(!lista.length){
    listaEl.innerHTML = `<div class="empty">Nenhum pedido com esses filtros.</div>`;
    return;
  }

  const grupos = agruparPorZona(lista);
  const zonasOrdenadas = Object.keys(grupos).sort((a,b) => formatarZona(a).localeCompare(formatarZona(b)));

  listaEl.innerHTML = zonasOrdenadas.map(z => {
    const itens = grupos[z];

    const cards = itens.map(v => {
      const cliente = v.cliente?.nome || "-";
      const contato = v.cliente?.contato || "-";
      const cidade = v.cliente?.cidade || "-";
      const zonaTxt = formatarZona(v.zona);
      const pedido = v.pedido || "-";
      const dataEntrega = v.dataEntrega || "-";
      const modelo = v.produto?.modelo || "-";
      const total = moedaBRL(v.total ?? v.valor ?? 0);

      const status = v.status || "em_entrega";
      const pillTxt = (status === "entregue") ? "ENTREGUE" : "EM ENTREGA";
      const pillClass = (status === "entregue") ? "pill entregue" : "pill em_entrega";

      return `
        <div class="card">
          <div class="card-top">
            <div>
              <p class="pedido">Pedido #${pedido}</p>
              <div class="line">Cliente: <b>${cliente}</b></div>
              <div class="line muted">Entrega: <b>${dataEntrega}</b> • Zona: <b>${zonaTxt}</b></div>
            </div>
            <div class="${pillClass}">${pillTxt}</div>
          </div>

          <div class="line">Produto: <b>${modelo}</b></div>
          <div class="line">Contato: <b>${contato}</b> • Cidade: <b>${cidade}</b></div>
          <div class="line">Endereço: <b>${enderecoCompleto(v) || "-"}</b></div>
          <div class="line"><b>Total:</b> ${total}</div>

          <div class="actions">
            ${
              status !== "entregue"
                ? `<button class="btn primary" onclick="marcarEntregue('${v.id}')">Marcar como entregue</button>`
                : `<button class="btn" type="button" disabled style="opacity:.6;cursor:not-allowed;">Já entregue</button>`
            }
            <button class="btn" onclick="abrirMapsById('${v.id}')">Abrir no Maps</button>
          </div>

          <div class="btn-row">
            <button class="btn" onclick="copiarContatoById('${v.id}')">Copiar contato</button>
            <button class="btn" onclick="imprimirById('${v.id}')">Imprimir pedido</button>
          </div>
          <div class="btn-row">
            <button class="btn" onclick="copiarEnderecoById('${v.id}')">Copiar endereço</button>
            <button class="btn" onclick="copiarPedidoById('${v.id}')">Copiar nº do pedido</button>
          </div>
        </div>
      `;
    }).join("");

    return `
      <div class="zone-wrap">
        <div class="zone-head">
          <div class="zone-title">${formatarZona(z)}</div>
          <div class="zone-count">${itens.length} pedido(s)</div>
        </div>
        <div class="zone-row">${cards}</div>
      </div>
    `;
  }).join("");
}

/* ===== Helpers globais pros botões ===== */
function acharVenda(id){ return vendasCache.find(v => v.id === id); }

window.abrirMapsById = (id) => { const v = acharVenda(id); if(v) abrirMaps(v); };
window.copiarContatoById = (id) => { const v = acharVenda(id); if(v) copiarTexto(v.cliente?.contato || ""); };
window.copiarEnderecoById = (id) => { const v = acharVenda(id); if(v) copiarTexto(enderecoCompleto(v)); };
window.copiarPedidoById = (id) => { const v = acharVenda(id); if(v) copiarTexto(String(v.pedido || "")); };
window.imprimirById = (id) => { const v = acharVenda(id); if(v) imprimirPedido(v); };
window.marcarEntregue = marcarEntregue;

/* ===== Eventos filtros ===== */
zonaFiltro.onchange = render;
dataFiltro.onchange = render;
buscaFiltro.oninput = render;

/* ===== Tabs (admin) ===== */
if (tabsStatus){
  tabsStatus.querySelectorAll(".tab").forEach(t => {
    t.onclick = () => {
      if (roleAtual !== "jader") return;
      tabsStatus.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
      t.classList.add("active");
      statusSelecionado = t.getAttribute("data-status") || "em_entrega";
      render();
    };
  });
}

/* ===== Auth ===== */
onAuthStateChanged(auth, async (user) => {
  if(!user){
    location.href = "login.html";
    return;
  }

  const role = await validarRole(user);
  if(!role){
    alert("Acesso restrito: apenas entregadores.");
    location.href = "login.html";
    return;
  }

  roleAtual = role;
  aplicarUIporRole();
  carregarPedidosEntrega();
});

document.getElementById("btnSair").onclick = async () => {
  await signOut(auth);
  location.href = "login.html";
};
</script>
