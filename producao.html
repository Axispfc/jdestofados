<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Produção - Pedidos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  body{
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:url("fundo.jpg") no-repeat center center fixed;
    background-size:cover;
    color:#fff;
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 30% 12%, rgba(33,150,243,0.18), transparent 45%),
      radial-gradient(circle at 80% 35%, rgba(76,175,80,0.10), transparent 45%),
      rgba(0,0,0,0.22);
    z-index:-1;
  }

  .container{
    max-width:1280px;
    margin:auto;
    padding:26px 22px 40px;
  }

  .topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    margin-bottom:16px;
  }

  .titulo{
    font-size:34px;
    font-weight:900;
    margin:0;
    letter-spacing:.2px;
  }

  .top-actions{
    display:flex;
    gap:10px;
    align-items:center;
  }

  .btn-pill{
    padding:10px 16px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.18);
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(12px);
    color:#fff;
    font-weight:800;
    cursor:pointer;
    transition:.2s ease;
    white-space:nowrap;
  }
  .btn-pill:hover{
    transform:translateY(-1px);
    background:rgba(255,255,255,0.12);
  }

  .linha{
    height:1px;
    background:rgba(255,255,255,0.14);
    margin:14px 0 18px;
  }

  /* Barra de ações */
  .barra{
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:16px;
  }

  .input, .select{
    padding:10px 14px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.16);
    background:rgba(0,0,0,0.22);
    color:#fff;
    outline:none;
    backdrop-filter:blur(10px);
  }

  .btn-primario{
    padding:11px 16px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    color:#fff;
    font-weight:900;
    background:linear-gradient(135deg,#0d63c9,#0b4da6);
    box-shadow:0 10px 24px rgba(0,0,0,0.35);
    transition:.2s ease;
  }
  .btn-primario:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 30px rgba(0,0,0,0.45);
  }

  .badge{
    padding:10px 14px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.16);
    background:rgba(0,0,0,0.18);
    backdrop-filter:blur(10px);
    font-weight:900;
  }

  /* Grid de cards */
  .cards{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:16px;
  }

  .card{
    background:rgba(0,0,0,0.18);
    border:1px solid rgba(255,255,255,0.16);
    border-radius:18px;
    padding:16px;
    backdrop-filter:blur(14px);
    box-shadow:0 18px 46px rgba(0,0,0,0.35);
    transition:.2s ease;
  }
  .card:hover{
    transform:translateY(-2px);
  }

  .card-top{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:flex-start;
    margin-bottom:10px;
  }

  .pedido{
    font-size:18px;
    font-weight:900;
    margin:0;
  }

  .status{
    font-size:12px;
    font-weight:900;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.16);
    background:rgba(255,152,0,0.18);
  }

  .status-producao{
  background:rgba(255,152,0,0.18);
  border:1px solid rgba(255,152,0,0.4);
}

.status-concluida{
  background:rgba(46,204,113,0.18);
  border:1px solid rgba(46,204,113,0.5);
}

  .linha-info{
    font-size:14px;
    opacity:.92;
    margin:6px 0;
  }

  .valor{
    font-weight:900;
    font-size:16px;
    margin-top:10px;
  }

  .acoes{
    display:flex;
    gap:10px;
    margin-top:14px;
    flex-wrap:wrap;
  }

  .btn-ok{
    flex:1;
    padding:10px 12px;
    border-radius:14px;
    border:none;
    cursor:pointer;
    font-weight:900;
    color:#0b1b0f;
    background:linear-gradient(135deg, #56ff8a, #2ecc71);
    box-shadow:0 10px 24px rgba(0,0,0,0.25);
    transition:.2s ease;
    min-width:160px;
  }
  .btn-ok:hover{ transform:translateY(-2px); }

  .btn-sec{
    flex:1;
    padding:10px 12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.16);
    cursor:pointer;
    font-weight:900;
    color:#fff;
    background:rgba(0,0,0,0.20);
    backdrop-filter:blur(10px);
    transition:.2s ease;
    min-width:160px;
  }
  .btn-sec:hover{ transform:translateY(-2px); background:rgba(255,255,255,0.10); }

  .vazio{
    grid-column:1/-1;
    text-align:center;
    padding:28px 18px;
    border:1px dashed rgba(255,255,255,0.22);
    border-radius:18px;
    background:rgba(0,0,0,0.18);
    backdrop-filter:blur(12px);
    font-weight:900;
    opacity:.9;
  }

  @media(max-width:1100px){
    .cards{ grid-template-columns:repeat(2,1fr); }
  }
  @media(max-width:740px){
    .cards{ grid-template-columns:1fr; }
    .titulo{ font-size:28px; }
  }

.anexos{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:8px;
}

.anexo{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.16);
  background:rgba(0,0,0,0.18);
  color:#fff;
  text-decoration:none;
  font-weight:800;
  font-size:13px;
}

.anexo:hover{
  background:rgba(255,255,255,0.10);
  transform:translateY(-1px);
}

.anexo-vazio{
  opacity:.85;
  font-weight:800;
  font-size:13px;
}
  
</style>
</head>

<body>
  <div class="container">

    <div class="topo">
      <h1 class="titulo">Produção</h1>
      <div class="top-actions">
        <button class="btn-pill" id="btnVoltar" type="button">⬅ Voltar</button>
        <button class="btn-pill" id="btnSair" type="button">Sair</button>
      </div>
    </div>

    <div class="linha"></div>

    <div class="barra">
      <input class="input" id="busca" type="text" placeholder="Buscar (pedido / cliente / vendedor)" />
      <input class="input" id="dataIni" type="date" />
      <input class="input" id="dataFim" type="date" />
      <button class="btn-primario" id="btnFiltrar" type="button">Filtrar</button>
      <button class="btn-pill" id="btnLimpar" type="button">Limpar</button>
      <div class="badge">Em produção: <span id="qtd">0</span></div>
    </div>

    <div class="cards" id="lista"></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlB4NN_lTrWv4sJ1PKp2m0YjoVADnIeHk",
  authDomain: "crm-vendas-43b6b.firebaseapp.com",
  projectId: "crm-vendas-43b6b",
  storageBucket: "crm-vendas-43b6b.appspot.com",
  messagingSenderId: "645002761099",
  appId: "1:645002761099:web:f194f70c351d1074ac158e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const elLista = document.getElementById("lista");
const elQtd = document.getElementById("qtd");
const elBusca = document.getElementById("busca");
const elIni = document.getElementById("dataIni");
const elFim = document.getElementById("dataFim");

let dados = [];
let userInfo = { nome:"", email:"" };
let entregadores = [];

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = "login.html";
    return;
  }
  userInfo.nome = user.displayName || "";
  userInfo.email = user.email || "";
  await carregarEntregadores();
  await carregar();
});

document.getElementById("btnVoltar").onclick = () => location.href = "jader.html";
document.getElementById("btnSair").onclick = async () => {
  await signOut(auth);
  location.href = "login.html";
};

document.getElementById("btnFiltrar").onclick = () => render();
document.getElementById("btnLimpar").onclick = () => {
  elBusca.value = "";
  elIni.value = "";
  elFim.value = "";
  render();
};

function moedaBRL(n){
  return (Number(n)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function normaliza(s){
  return String(s||"").toLowerCase().trim();
}

async function carregarEntregadores(){
  // pega todos os usuários que são entregadores
  const q = query(collection(db, "usuarios"), where("role", "==", "entregador"));
  const snap = await getDocs(q);

  entregadores = snap.docs.map(d => {
    const data = d.data();
    return {
      id: d.id, // <-- ESTE É O DOC ID (normalmente o UID do Auth)
      name: data.name || data.nome || data.email || "Entregador",
      email: data.email || ""
    };
  }).sort((a,b) => String(a.name).localeCompare(String(b.name)));
}

function htmlOptionsEntregadores(){
  if (!entregadores.length){
    return `<option value="">Nenhum entregador cadastrado</option>`;
  }
  return `<option value="">Selecione o entregador...</option>` +
    entregadores.map(e => `<option value="${e.id}">${e.name}</option>`).join("");
}

async function carregar(){
 elLista.innerHTML = `<div class="vazio">Carregando pedidos em produção...</div>`;

  // pega somente status = "producao"
  const q = query(collection(db,"vendas"), where("status", "in", ["producao", "producao_concluida"]));
  const snap = await getDocs(q);

  dados = [];
  snap.forEach(d => {
    dados.push({ id: d.id, ...d.data() });
  });

  render();
}

function passaFiltro(item){
  const b = normaliza(elBusca.value);
  const ini = elIni.value ? new Date(elIni.value + "T00:00:00") : null;
  const fim = elFim.value ? new Date(elFim.value + "T23:59:59") : null;

  const pedido = normaliza(item.pedido);
  const cliente = normaliza(item.cliente?.nome);
  const vendedor = normaliza(item.vendedorNome);

  if (b){
    const ok = pedido.includes(b) || cliente.includes(b) || vendedor.includes(b);
    if (!ok) return false;
  }

  // dataPedido vem como "YYYY-MM-DD" (string)
  if (ini || fim){
    const dp = item.dataPedido ? new Date(item.dataPedido + "T12:00:00") : null;
    if (!dp) return false;
    if (ini && dp < ini) return false;
    if (fim && dp > fim) return false;
  }

  return true;
}

function render(){
  const filtrados = dados.filter(passaFiltro);
  elQtd.textContent = filtrados.length;

  if (!filtrados.length){
    elLista.innerHTML = `<div class="vazio">Nenhum pedido em produção com esse filtro.</div>`;
    return;
  }

  elLista.innerHTML = filtrados.map(v => {
    const nomeCliente = v.cliente?.nome || "-";
    const contato = v.cliente?.contato || "-";
    const cidade = v.cliente?.cidade || "-";
    const zona = v.zona || "-";
    const modelo = v.produto?.modelo || "-";
    const cor = v.produto?.cor || "-";
    const tamanho = v.produto?.tamanho || "-";
    const total = v.total ?? v.valor ?? 0;
    const statusTxt = (v.status === "producao_concluida") ? "PRODUÇÃO CONCLUÍDA" : "PRODUÇÃO";
    const statusClass = (v.status === "producao_concluida")
  ? "status status-concluida"
  : "status status-producao";

    return `
      <div class="card">
        <div class="card-top">
        <div class="linha-info"><b>Anexos da produção:</b></div>

<div class="anexos">
  ${
    (v.anexosProducao && v.anexosProducao.length)
      ? v.anexosProducao.map(a => `
          <a class="anexo" href="${a.url}" target="_blank" rel="noopener">
            📎 ${a.nome || "Arquivo"}
          </a>
        `).join("")
      : `<div class="anexo-vazio">Nenhum anexo enviado</div>`
  }
</div>
          <div>
            <p class="pedido">Pedido #${v.pedido ?? "-"}</p>
            <div class="linha-info">Cliente: <b>${nomeCliente}</b></div>
          </div>
          <div class="${statusClass}">${statusTxt}</div>
        </div>

        <div class="linha-info">Vendedor: <b>${v.vendedorNome || "-"}</b></div>
        <div class="linha-info">Pedido: <b>${v.dataPedido || "-"}</b> • Entrega: <b>${v.dataEntrega || "-"}</b></div>
        <div class="linha-info">Produto: <b>${modelo}</b></div>
        <div class="linha-info">Tamanho: <b>${tamanho}</b> • Cor: <b>${cor}</b></div>
        <div class="linha-info">Contato: <b>${contato}</b> • Cidade: <b>${cidade}</b></div>
        <div class="linha-info">Zona: <b>${zona}</b></div>

        <div class="valor">Total: ${moedaBRL(total)}</div>

        <div class="acoes">
  ${
    v.status === "producao_concluida"
? `
  <select class="control entregador-select" data-id="${v.id}" style="margin-bottom:10px;">
    ${htmlOptionsEntregadores()}
  </select>

  <button class="btn-ok btn-entrega" type="button" data-id="${v.id}">
    Enviar para Entrega
  </button>
`
: ``
  }

  <button class="btn-sec" type="button" data-copiar="${contato}">
    Copiar Contato
  </button>
</div>
      </div>
    `;
  }).join("");

// eventos do botão ENVIAR PARA ENTREGA
elLista.querySelectorAll(".btn-entrega").forEach(btn => {
  btn.onclick = async () => {
    const id = btn.getAttribute("data-id");
    if (!id) return;

    btn.disabled = true;
    const txtOriginal = btn.textContent;
    btn.textContent = "Enviando...";

    const box = btn.closest(".acoes");
const sel = box ? box.querySelector(".entregador-select") : null;
const entregadorId = sel ? sel.value : "";

if (!entregadorId){
  alert("Selecione o entregador antes de enviar para entrega.");
  btn.disabled = false;
  btn.textContent = txtOriginal;
  return;
}

const entregador = entregadores.find(e => e.id === entregadorId);
const entregadorNome = entregador?.name || "Entregador";

    try{
      await enviarParaEntrega(id, entregadorId, entregadorNome); // <-- chama a função certa
      // remove do array local e renderiza (opcional)
    }catch(e){
      console.error(e);
      alert("Erro ao enviar para entrega. Veja o console.");
      btn.disabled = false;
      btn.textContent = txtOriginal;
    }
  };
});

  // eventos do botão COPIAR CONTATO
elLista.querySelectorAll("[data-copiar]").forEach(btn => {
  btn.onclick = async () => {
    const txt = btn.getAttribute("data-copiar") || "";
    try{
      await navigator.clipboard.writeText(txt);
      btn.textContent = "Copiado ✅";
      setTimeout(()=> btn.textContent = "Copiar Contato", 900);
    }catch{
      alert("Não consegui copiar. Copie manualmente: " + txt);
    }
  };
});

  async function enviarParaEntrega(id, entregadorId, entregadorNome){
  const ok = confirm(`Enviar este pedido para ENTREGA?\nEntregador: ${entregadorNome}`);
  if(!ok) return;

  await updateDoc(doc(db, "vendas", id), {
    status: "em_entrega",
    enviadoParaEntregaEm: new Date().toISOString(),
    entregadorId: entregadorId,
    entregadorNome: entregadorNome
  });

  alert("Pedido enviado para entrega!");
  location.reload();
}

window.enviarParaEntrega = enviarParaEntrega;

}
  
</script>
</body>
</html>
