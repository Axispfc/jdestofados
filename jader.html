<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Dashboard - Jader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== FUNDO (igual) ===== */
body{
  margin:0;
  font-family:'Segoe UI', Arial, sans-serif;
  background:url("fundo.jpg") no-repeat center center fixed;
  background-size:cover;
  color:#fff;
}

/* overlay suave igual ao mock */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 30% 12%, rgba(33,150,243,0.18), transparent 45%),
    radial-gradient(circle at 80% 35%, rgba(76,175,80,0.10), transparent 45%),
    rgba(0,0,0,0.22);
  z-index:-1;
}

/* ===== LAYOUT ===== */
.container{
  width:100%;
  max-width:100%;
  margin:0;
  padding:34px 40px;
}

/* ===== TOPO ===== */
.dashboard{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap:20px;
  width:100%;
}

.title{
  font-size:44px;
  font-weight:900;
  letter-spacing:.3px;
  margin:0;
}

.top-actions{
  display:flex;
  gap:12px;
  align-items:center;
}

.btn-pill{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 18px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(12px);
  cursor:pointer;
  color:#fff;
  font-weight:800;
  transition:.25s ease;
}

.btn-pill:hover{
  transform:translateY(-1px);
  background:rgba(255,255,255,0.12);
}

.avatar{
  width:44px;
  height:44px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(12px);
  display:grid;
  place-items:center;
  font-size:20px;
}

/* ===== MENU ===== */
.menu{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  margin:14px 0 18px;
}

.menu button{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:18px 18px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  color:#fff;
  font-weight:900;
  font-size:16px;
  background:linear-gradient(135deg,#0d63c9,#0b4da6);
  box-shadow:0 10px 24px rgba(0,0,0,0.45);
  transition:.25s ease;
}

.menu button:hover{
  transform:translateY(-3px);
  box-shadow:0 16px 34px rgba(0,0,0,0.55);
}

.icon{
  width:20px;
  height:20px;
  display:inline-block;
}
.icon svg{ width:20px; height:20px; fill:#fff; opacity:.95; }

/* ===== GRID DOS CARDS ===== */
.dashboard{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:18px;
}

/* ===== CARD GLASS ===== */
.card{
  background: rgba(0,0,0,0.18);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius:18px;
  padding:18px;
  backdrop-filter:blur(14px);
  box-shadow:0 18px 46px rgba(0,0,0,0.45);
}

.card h2{
  margin:0 0 10px;
  font-size:22px;
  font-weight:900;
  letter-spacing:.2px;
}

/* ===== STATUS CARD GRANDE ===== */
.card--wide{
  grid-column:span 2;
  padding:18px;
}

.status-wrap{
  display:grid;
  grid-template-columns: 1.2fr .8fr;
  gap:12px;
  align-items:center;
}

.legend{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:6px 8px;
}

.legend-item{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:20px;
  font-weight:900;
  opacity:.95;
}

.dot{
  width:14px;
  height:14px;
  border-radius:4px;
  display:inline-block;
  box-shadow:0 0 0 2px rgba(255,255,255,0.08);
}

.dot.blue{ background:#2196f3; }
.dot.orange{ background:#ff9800; }
.dot.green{ background:#4caf50; }

/* ===== RESUMO (padrão) ===== */
.resumo{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  font-size:20px;
  font-weight:900;
}

#valorTotal, #ticketMedio{
  color:#79ff9a;
}

/* ===== CANVAS (padrão do mock) ===== */
canvas{
  width:100% !important;
  height:240px !important;
  max-height:240px;
}

.card--wide canvas{
  height:260px !important;
  max-height:260px;
}

/* cards inferiores mais “baixos” como no mock */
.dashboard > .card:not(.card--wide){
  min-height:320px;
}

/* ===== VALORES ===== */
.card-valores .valores-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
  margin-bottom:10px;
}

.card-valores .valores-title{
  margin:0;
}

.card-valores .valores-stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  width:100%;
  margin:6px 0 12px;
}

.card-valores .stat-box{
  background:rgba(0,0,0,0.18);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:16px;
  padding:12px 14px;
}

.card-valores .stat-label{
  font-size:13px;
  font-weight:900;
  opacity:.9;
  margin-bottom:6px;
}

.card-valores .stat-value{
  font-size:18px;
  font-weight:900;
}

.card-valores #valorTotal,
.card-valores #ticketMedio{
  color:#79ff9a;
}

.card-valores #valoresChart{
  height:260px !important;
  max-height:260px !important;
}

/* responsivo */
@media (max-width:1000px){
  .menu{ grid-template-columns:1fr 1fr; }
  .dashboard{ grid-template-columns:1fr; }
  .card--wide{ grid-column:span 1; }
  .status-wrap{ grid-template-columns:1fr; }
  .title{ font-size:32px; }
}

@media (max-width:560px){
  .menu{ grid-template-columns:1fr; }
  .card-valores .valores-stats{ grid-template-columns:1fr; }
}

.filtros{
  display:flex;
  align-items:center;
  gap:10px;
  margin: 10px 0 18px;
}

.filtro-label{
  font-weight:900;
  opacity:.95;
}

.filtro-select{
  padding:10px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.16);
  background:rgba(0,0,0,0.22);
  color:#fff;
  outline:none;
  backdrop-filter:blur(10px);
  font-weight:900;
}
  
</style>
</head>

<body>
<div class="container">

  <!-- TOPO -->
  <div class="topbar">
    <h1 class="title">Dashboard Geral</h1>

    <div class="top-actions">
      <button id="btnSair" class="btn-pill" type="button">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M10 17v-2h4v2h-4Zm-6.4 1.6 1.4-1.4A9.97 9.97 0 0 1 12 14c2.61 0 5.01 1 6.99 2.8l1.41 1.41-1.41 1.41-1.41-1.41A7.97 7.97 0 0 0 12 16c-2.09 0-4.02.8-5.58 2.2l-1.42 1.4-1.4-1.4Zm-1.6-4 1.4-1.4A14 14 0 0 1 12 10c3.7 0 7.1 1.4 9.6 3.6l1.4 1.4-1.4 1.4-1.4-1.4A12 12 0 0 0 12 12c-3.13 0-6.02 1.18-8.2 3.2l-1.4 1.4-1.4-1.4Z"/>
          </svg>
        </span>
        Sair
      </button>

      <div class="avatar" title="Jader">👤</div>
    </div>
  </div>

  <!-- MENU -->
  <div class="menu">
    <button onclick="location.href='gerenciar-pedidos.html'">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M7 2h10v2H7V2Zm-2 4h14v14H5V6Zm2 2v10h10V8H7Zm2 2h6v2H9v-2Zm0 4h6v2H9v-2Z"/></svg>
      </span>
      Gerenciar Pedidos
    </button>

    <button onclick="location.href='entregas-adm.html'">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M3 7h13v6h5l-2 4h-2a3 3 0 0 1-6 0H9a3 3 0 0 1-6 0H1v-2h2V9a2 2 0 0 1 2-2Zm2 2v6h1a3 3 0 0 1 6 0h3V9H5Zm14 6a1 1 0 1 0 0 2 1 1 0 0 0 0-2Zm-12 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2Z"/>
        </svg>
      </span>
      Entregas
    </button>

    <button onclick="acessarFinanceiro()">
  <span class="icon" aria-hidden="true">
    <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3V3Zm2 2v14h14V5H5Zm2 10h2v2H7v-2Zm0-4h2v3H7v-3Zm4 2h2v4h-2v-4Zm4-6h2v10h-2V7Z"/></svg>
  </span>
  Financeiro
</button>

  <button onclick="location.href='estoque.html'">
  <span class="icon" aria-hidden="true">
    <svg viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 7-7 1 1-8 8-4-4-5 5H3Zm0 4h18v2H3v-2Z"/></svg>
  </span>
  Estoque
</button>
  </div>

  <!-- FILTRO DE MÊS -->
  <div class="filtros">
    <label for="mesSelect" class="filtro-label">Mês:</label>
    <select id="mesSelect" class="filtro-select"></select>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard">

    <!-- STATUS (CARD GRANDE) -->
    <div class="card card--wide">
      <h2>Status das Vendas</h2>

      <div class="status-wrap">
        <div>
          <canvas id="statusChart"></canvas>
        </div>

        <div class="legend">
          <div class="legend-item"><span class="dot blue"></span> Ativa</div>
          <div class="legend-item"><span class="dot orange"></span> Em Entrega</div>
          <div class="legend-item"><span class="dot green"></span> Entregue</div>
        </div>
      </div>
    </div>

    <!-- FORMAS DE PAGAMENTO -->
    <div class="card">
      <h2>Formas de Pagamento</h2>
      <canvas id="pagamentoChart"></canvas>
    </div>

    <!-- QUANTIDADE -->
    <div class="card">
      <h2>Quantidade de Vendas</h2>
      <canvas id="quantidadeChart"></canvas>
      <div class="resumo">
        <span>Total:</span>
        <span id="totalVendas">0</span>
      </div>
    </div>

    <!-- VALORES -->
    <div class="card card--wide card-valores">
      <div class="valores-head">
        <h2 class="valores-title">Valores de Vendas</h2>
      </div>

      <div class="valores-stats">
        <div class="stat-box">
          <div class="stat-label">Total Geral</div>
          <div class="stat-value" id="valorTotal">R$ 0,00</div>
        </div>

        <div class="stat-box">
          <div class="stat-label">Ticket Médio</div>
          <div class="stat-value" id="ticketMedio">R$ 0,00</div>
        </div>
      </div>

      <canvas id="valoresChart"></canvas>
    </div>

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlB4NN_lTrWv4sJ1PKp2m0YjoVADnIeHk",
  authDomain: "crm-vendas-43b6b.firebaseapp.com",
  projectId: "crm-vendas-43b6b",
  storageBucket: "crm-vendas-43b6b.appspot.com",
  messagingSenderId: "645002761099",
  appId: "1:645002761099:web:f194f70c351d1074ac158e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let vendasCache = [];
const mesSelect = document.getElementById("mesSelect");
let charts = [];

function destroyCharts(){
  charts.forEach(c => { try { c.destroy(); } catch(e){} });
  charts = [];
}

function applyChartDefaults(){
  Chart.defaults.color = "rgba(255,255,255,0.85)";
  Chart.defaults.font.family = "'Segoe UI', Arial, sans-serif";
  Chart.defaults.plugins.legend.labels.usePointStyle = true;
  Chart.defaults.plugins.legend.labels.boxWidth = 10;
}

function montarMesesNoSelect() {
  if (!mesSelect) return;

  const meses = [...new Set(
    vendasCache
      .map(v => String(v.dataPedido || "").slice(0,7))
      .filter(m => m && m.length === 7)
  )].sort();

  meses.reverse();

  mesSelect.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join("");

  if (!mesSelect.value && meses.length) mesSelect.value = meses[0];
}

function renderDashboard(mesFiltro) {
  applyChartDefaults();
  destroyCharts();

  const status = { ativa:0, em_entrega:0, entregue:0 };
  const pagamentos = {};
  const vendasPorMes = {};
  const valoresPorMes = {};

  let totalVendas = 0;
  let somaValores = 0;

  vendasCache.forEach(v => {
    const mes = String(v.dataPedido || "").slice(0,7);
    if (!mes) return;
    if (mesFiltro && mes !== mesFiltro) return;

    if (v.status && Object.prototype.hasOwnProperty.call(status, v.status)) {
      status[v.status]++;
    }

    const pg = v.pagamento?.tipo || v.pagamento;
    if (pg) pagamentos[pg] = (pagamentos[pg] || 0) + 1;

    vendasPorMes[mes] = (vendasPorMes[mes] || 0) + 1;

    const valor = Number(v.total ?? v.valor ?? v.produto?.total ?? 0);
    if (Number.isFinite(valor) && valor > 0) {
      somaValores += valor;
      totalVendas++;
      valoresPorMes[mes] = (valoresPorMes[mes] || 0) + valor;
    }
  });

  const elTotal = document.getElementById("totalVendas");
  if (elTotal) elTotal.textContent = totalVendas;

  const elValor = document.getElementById("valorTotal");
  if (elValor) elValor.textContent = somaValores.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

  const elTicket = document.getElementById("ticketMedio");
  if (elTicket) elTicket.textContent = totalVendas
    ? (somaValores/totalVendas).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})
    : "R$ 0,00";

  charts.push(new Chart(document.getElementById("statusChart"),{
    type:"doughnut",
    data:{
      labels:["Ativa","Em Entrega","Entregue"],
      datasets:[{
        data:[ status.ativa, status.em_entrega, status.entregue ],
        backgroundColor:[ "#2196f3", "#ff9800", "#4caf50" ],
        borderColor:"rgba(255,255,255,0.75)",
        borderWidth:2,
        hoverOffset:6
      }]
    },
    options:{ responsive:true, maintainAspectRatio:false, cutout:"68%", plugins:{ legend:{ display:false } } }
  }));

  charts.push(new Chart(document.getElementById("pagamentoChart"),{
    type:"pie",
    data:{ labels:Object.keys(pagamentos), datasets:[{
      data: Object.values(pagamentos),
      backgroundColor: [
        "#2196f3", "#ff9800", "#4caf50", "#9c27b0",
        "#00bcd4", "#ffc107", "#f44336", "#795548",
        "#607d8b", "#e91e63", "#3f51b5", "#8bc34a"
      ],
      borderColor: "rgba(255,255,255,0.75)",
      borderWidth: 2
    }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:"top" } } }
  }));

  const labelsQtd = Object.keys(vendasPorMes);
  const dadosQtd  = Object.values(vendasPorMes);

  charts.push(new Chart(document.getElementById("quantidadeChart"),{
    type:"bar",
    data:{
      labels: labelsQtd.length ? labelsQtd : [mesFiltro || "—"],
      datasets:[{
        label:"Vendas",
        data: dadosQtd.length ? dadosQtd : [0],
        backgroundColor:"rgba(33,150,243,0.85)",
        borderRadius:10
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{ x:{ grid:{ display:false } }, y:{ grid:{ color:"rgba(255,255,255,0.08)" }, ticks:{ precision:0 } } },
      plugins:{ legend:{ display:false } }
    }
  }));

  charts.push(new Chart(document.getElementById("valoresChart"),{
    type:"bar",
    data:{
      labels:Object.keys(valoresPorMes),
      datasets:[{
        label:"Valor",
        data:Object.values(valoresPorMes),
        backgroundColor:"rgba(76,175,80,0.85)",
        borderRadius:10
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{ x:{ grid:{ display:false } }, y:{ grid:{ color:"rgba(255,255,255,0.08)" } } },
      plugins:{ legend:{ display:false } }
    }
  }));
}

 window.acessarFinanceiro = function () {
  const senhaCorreta = "1234"; // troque pela senha que quiser

  const senhaDigitada = prompt("Digite a senha para acessar o Financeiro:");

  if (senhaDigitada === null) return;

  if (senhaDigitada === senhaCorreta) {
    sessionStorage.setItem("financeiroLiberado", "sim");
    location.href = "financeiro.html";
  } else {
    alert("Senha incorreta!");
  }
}; 

async function carregarDashboard() {
  const snapshot = await getDocs(collection(db, "vendas"));

  vendasCache = [];
  snapshot.forEach(d => vendasCache.push(d.data()));

  montarMesesNoSelect();
  renderDashboard(mesSelect?.value);
}  

onAuthStateChanged(auth, user => {
  if (!user) {
    location.href = "login.html";
    return;
  }
  carregarDashboard();
});

if (mesSelect){
  mesSelect.onchange = () => renderDashboard(mesSelect.value);
}

document.getElementById("btnSair").onclick = async () => {
  await signOut(auth);
  location.href = "login.html";
};

</script>

</body>
</html>
