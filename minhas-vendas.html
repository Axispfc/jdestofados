function formatarDataLocal(date) {
  const ano = date.getFullYear();
  const mes = String(date.getMonth() + 1).padStart(2, "0");
  const dia = String(date.getDate()).padStart(2, "0");
  return `${ano}-${mes}-${dia}`;
}

function inicioDaSemana(data = new Date()) {
  const d = new Date(data);
  const dia = d.getDay();
  const diff = dia === 0 ? -6 : 1 - dia;
  d.setDate(d.getDate() + diff);
  return d;
}

function moedaBRL(n){
  return Number(n || 0).toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

function formatarZona(z){
  const map = {
    centro: "Centro",
    zona_norte: "Zona Norte",
    zona_sul: "Zona Sul",
    zona_leste: "Zona Leste",
    zona_oeste: "Zona Oeste",
    abc_paulista: "ABC Paulista",
    litoral_sul: "Litoral Sul",
    litoral_norte: "Litoral Norte",
    sudoeste: "Sudoeste",
    interior: "Interior"
  };
  return map[z] || (z ? String(z) : "-");
}

function enderecoCompleto(v){
  const c = v.cliente || {};
  const partes = [c.rua, c.numero, c.bairro, c.cidade, c.cep].filter(Boolean);
  return partes.join(" - ");
}

function aplicarPeriodoAutomatico() {
  const periodo = document.getElementById("filtroPeriodo").value;
  const dataInicio = document.getElementById("dataInicio");
  const dataFim = document.getElementById("dataFim");
  const hoje = new Date();

  if (periodo === "dia") {
    const hojeFormatado = formatarDataLocal(hoje);
    dataInicio.value = hojeFormatado;
    dataFim.value = hojeFormatado;
    dataInicio.disabled = true;
    dataFim.disabled = true;
  } else if (periodo === "semana") {
    dataInicio.value = formatarDataLocal(inicioDaSemana(hoje));
    dataFim.value = formatarDataLocal(hoje);
    dataInicio.disabled = true;
    dataFim.disabled = true;
  } else if (periodo === "mes") {
    const inicioMes = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
    dataInicio.value = formatarDataLocal(inicioMes);
    dataFim.value = formatarDataLocal(hoje);
    dataInicio.disabled = true;
    dataFim.disabled = true;
  } else {
    dataInicio.disabled = false;
    dataFim.disabled = false;
    dataInicio.value = "";
    dataFim.value = "";
  }
}

function aplicarFiltros() {
  const dataInicio = document.getElementById("dataInicio").value;
  const dataFim = document.getElementById("dataFim").value;
  const cliente = document.getElementById("filtroCliente").value.toLowerCase().trim();
  const pedido = document.getElementById("filtroPedido").value.toLowerCase().trim();

  vendasFiltradas = todasVendas.filter(venda => {
    const nomeCliente = venda.cliente?.nome?.toLowerCase() || "";
    const numeroPedido = String(venda.pedido || "").toLowerCase();
    const dataVenda = String(venda.dataPedido || "");

    const matchCliente = !cliente || nomeCliente.includes(cliente);
    const matchPedido = !pedido || numeroPedido.includes(pedido);

    let matchPeriodo = true;

    if (dataInicio && dataVenda < dataInicio) {
      matchPeriodo = false;
    }

    if (dataFim && dataVenda > dataFim) {
      matchPeriodo = false;
    }

    return matchCliente && matchPedido && matchPeriodo;
  });

  paginaAtual = 1;
  renderizarPagina();
}

function limparFiltros() {
  document.getElementById("filtroPeriodo").value = "dia";
  document.getElementById("filtroCliente").value = "";
  document.getElementById("filtroPedido").value = "";
  aplicarPeriodoAutomatico();
  vendasFiltradas = [...todasVendas];
  paginaAtual = 1;
  renderizarPagina();
}

function renderizarPagina() {
  const lista = document.getElementById("listaVendas");

  const fim = inicio + itensPorPagina;
  const pagina = vendasFiltradas.slice(inicio, fim);

    lista.innerHTML = "<p>Nenhuma venda encontrada.</p>";
    return;
  }

  pagina.forEach(venda => {

    div.className = "card";

    div.innerHTML = `
      <strong>Pedido:</strong> ${venda.pedido || "-"}<br>
      <strong>Cliente:</strong> ${venda.cliente?.nome || "-"}<br>
      <strong>Total:</strong> R$ ${Number(venda.total || 0).toFixed(2)}<br>
      <strong>Data:</strong> ${venda.dataPedido || "-"}<br>
      <strong class="status">Status:</strong> ${venda.status === "pendente" ? "ativa" : venda.status || "-"}<br>
    `;

    const btnEditar = document.createElement("button");
    btnEditar.textContent = "Editar";
    btnEditar.style.background = "#5bc0de";
    btnEditar.style.marginLeft = "8px";

    btnEditar.onclick = () => {
      location.href = `editar-venda.html?id=${venda.id}`;
    };


    div.appendChild(btnEditar);

    const btnExcluir = document.createElement("button");
    btnExcluir.textContent = "Excluir";
    btnExcluir.style.background = "#d9534f";
    btnExcluir.style.marginLeft = "8px";

    btnExcluir.onclick = async () => {
      const confirmar = confirm("Tem certeza que deseja excluir esta venda?");
      if (!confirmar) return;

      await deleteDoc(doc(db, "vendas", venda.id));

      alert("Venda excluída com sucesso!");
      location.reload();
    };

    div.appendChild(btnExcluir);

    const btnTermo = document.createElement("button");
    btnTermo.textContent = "Termo garantia";
    btnTermo.className = "btn-termo";

    btnTermo.onclick = () => {
      imprimirPedido(venda);
    };

    div.appendChild(btnTermo);

    lista.appendChild(div);
  });
}

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = "login.html";
    return;
  }

  const q = query(
    collection(db, "vendas"),
    where("vendedorEmail", "==", user.email)
  );

  const snapshot = await getDocs(q);

  todasVendas = [];
  snapshot.forEach(docSnap => {
    todasVendas.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  todasVendas.sort((a, b) => {
    return new Date(b.dataPedido) - new Date(a.dataPedido);
  });

  aplicarPeriodoAutomatico();
  vendasFiltradas = [...todasVendas];
  renderizarPagina();
});

document.getElementById("filtroPeriodo").addEventListener("change", aplicarPeriodoAutomatico);
document.getElementById("btnFiltrar").onclick = aplicarFiltros;
document.getElementById("btnLimpar").onclick = limparFiltros;

document.getElementById("btnAnterior").onclick = () => {
  if (paginaAtual > 1) {
    paginaAtual--;
    renderizarPagina();
  }
};

document.getElementById("btnProxima").onclick = () => {
  if (paginaAtual * itensPorPagina < vendasFiltradas.length) {
    paginaAtual++;
    renderizarPagina();
  }
};
</script>
</body>
