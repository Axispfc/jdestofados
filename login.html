<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CRM - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: url("fundo.jpg") no-repeat center center fixed;
  background-size: cover;
}

/* LOGO */
.logo {
  width: 160px;
  margin-bottom: 25px;
  filter: drop-shadow(0 0 15px rgba(212,175,55,0.6));
}

/* CARD */
.container {
  width: 100%;
  max-width: 420px;
  padding: 40px;
  border-radius: 18px;
  background: rgba(0, 0, 0, 0.85);
  border: 1px solid rgba(212,175,55,0.6);
  box-shadow: 0 0 40px rgba(212,175,55,0.25);
  backdrop-filter: blur(8px);
}

h1 {
  text-align: center;
  margin-bottom: 30px;
  font-size: 28px;
  color: #d4af37;
  letter-spacing: 1px;
}

label {
  color: #d4af37;
  font-weight: 600;
  font-size: 14px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 8px 0 18px 0;
  border-radius: 10px;
  border: 1px solid rgba(212,175,55,0.5);
  background: rgba(0,0,0,0.6);
  color: #fff;
  font-size: 15px;
  outline: none;
  transition: 0.3s;
}

input:focus {
  border-color: #d4af37;
  box-shadow: 0 0 10px rgba(212,175,55,0.4);
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  background: linear-gradient(90deg, #d4af37, #b8860b);
  color: #000;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 15px rgba(212,175,55,0.6);
}

.error {
  color: #ff4d4d;
  font-size: 14px;
  margin-bottom: 10px;
  text-align: center;
}

.links {
  text-align: center;
  margin-top: 20px;
}

.links a {
  color: #d4af37;
  text-decoration: none;
  display: block;
  margin-top: 8px;
  font-size: 14px;
  transition: 0.3s;
}

.links a:hover { color: #fff; }
</style>
</head>

<body>

<img src="logo-jd.png" class="logo">

<div class="container">
  <h1>Login</h1>
  <div class="error" id="loginError"></div>

  <label>Email</label>
  <input type="email" id="email" required>

  <label>Senha</label>
  <input type="password" id="senha" required>

  <button id="btnLogin">Entrar</button>

  <div class="links">
    <a href="cadastro.html">Criar conta</a>
    <a href="recuperar.html">Esqueci minha senha</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  collection,
  query,
  where,
  getDocs,
  limit
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlB4NN_lTrWv4sJ1PKp2m0YjoVADnIeHk",
  authDomain: "crm-vendas-43b6b.firebaseapp.com",
  projectId: "crm-vendas-43b6b",
  storageBucket: "crm-vendas-43b6b.appspot.com",
  messagingSenderId: "645002761099",
  appId: "1:645002761099:web:f194f70c351d1074ac158e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const EMAIL_JADER = "jader@hotmail.com";

function redirecionarPorRole(role){
  if (role === "jader") return (window.location.href = "jader.html");
  if (role === "producao") return (window.location.href = "producao-func.html");
  if (role === "entregador") return (window.location.href = "entregas.html");
  return (window.location.href = "index.html");
}

/**
 * 1) Tenta /usuarios/{uid}
 * 2) Se não existir, tenta achar na coleção por email (doc com ID automático)
 */
async function obterRolePorUidOuEmail(user){
  // 1) por UID (docId = uid)
  try{
    const refUid = doc(db, "usuarios", user.uid);
    const snapUid = await getDoc(refUid);
    if (snapUid.exists()){
      const data = snapUid.data() || {};
      const role = String(data.role || "").toLowerCase().trim();
      if (role) return role;
    }
  }catch(e){
    // não trava por causa disso
    console.warn("Falha ao ler /usuarios/{uid}:", e);
  }

  // 2) fallback por EMAIL (docId pode ser aleatório)
  try{
    const q = query(
      collection(db, "usuarios"),
      where("email", "==", user.email),
      limit(1)
    );
    const snap = await getDocs(q);
    if (!snap.empty){
      const data = snap.docs[0].data() || {};
      const role = String(data.role || "").toLowerCase().trim();
      if (role) return role;
    }
  }catch(e){
    console.warn("Falha ao buscar role por email:", e);
  }

  return "";
}

btnLogin.onclick = async () => {
  loginError.textContent = "";

  try {
    const cred = await signInWithEmailAndPassword(auth, email.value, senha.value);
    const user = cred.user;
    console.log("UID LOGADO:", user.uid,
                "EMAIL:", user.email);

    // Atalho: Jader pelo email (se quiser manter)
    if (user.email === EMAIL_JADER){
      window.location.href = "jader.html";
      return;
    }

    const role = await obterRolePorUidOuEmail(user);

    if (!role){
      loginError.textContent = "Seu usuário não está liberado (role não encontrado em /usuarios).";
      return;
    }

    redirecionarPorRole(role);

  } catch (e) {
    loginError.textContent = "Email ou senha inválidos.";
  }
};

// Se já estiver logado e abrir a tela de login, manda pra tela certa
onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  if (user.email === EMAIL_JADER){
    window.location.href = "jader.html";
    return;
  }

  const role = await obterRolePorUidOuEmail(user);
  if (!role){
    // logado mas sem role no Firestore
    window.location.href = "index.html";
    return;
  }

  redirecionarPorRole(role);
});
</script>

</body>
</html>
