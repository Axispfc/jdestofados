<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CRM - Registro de Vendas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: url("fundo.jpg") no-repeat center center fixed;
  background-size: cover;
  color: #fff;
}

/* ANIMAÇÃO SUAVE */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.container {
  max-width: 520px;
  margin: 40px auto;
  padding: 30px;
  background: rgba(0, 0, 0, 0.88);
  border-radius: 18px;
  border: 1px solid rgba(212,175,55,0.5);
  box-shadow: 0 0 35px rgba(212,175,55,0.15);
  animation: fadeUp 0.6s ease-out;
}

.logo {
  text-align: center;
  margin-bottom: 20px;
}

.logo img {
  width: 120px;
  filter: drop-shadow(0 0 8px rgba(212,175,55,0.6));
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  color: #d4af37;
}

label {
  font-size: 14px;
  margin-top: 8px;
  display: block;
}

input, textarea, select, button {
  width: 100%;
  margin: 6px 0;
  padding: 12px;
  font-size: 15px;
  border-radius: 10px;
  border: 1px solid #444;
  background: #111;
  color: #fff;
}

input:disabled {
  background: #222;
}

textarea {
  resize: vertical;
  min-height: 70px;
}

button {
  background: linear-gradient(45deg,#d4af37,#b8962e);
  border: none;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover {
  transform: scale(1.03);
}

.parcelas {
  display: none;
  gap: 8px;
  flex-wrap: wrap;
}

.parcelas button {
  width: auto;
  padding: 8px 14px;
  background: #222;
  border: 1px solid #555;
}

.parcelas button.ativa {
  background: #d4af37;
  color: #000;
}

hr {
  border: none;
  height: 1px;
  background: rgba(212,175,55,0.4);
  margin: 18px 0;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
  <img src="logo-jd.png" alt="Logo JD">
</div>

<h1>Registro de Venda</h1>

<form id="formVenda">

<label>Nº do Pedido</label>
<input id="pedido" disabled>

<label>Data do Pedido</label>
<input type="date" id="dataPedido" required>

<label>Data da Entrega</label>
<input type="date" id="dataEntrega" required>

<label><input type="checkbox" id="montagem" style="width:auto;"> Montagem</label>

<hr>

<label>Modelo do Sofá</label>
<select id="modelo" required>
<option value="">Selecione</option>
<option>Sofá carina braço almofadado pilow de 15</option>
<option>Sofá carina braço almofadado pilow de 25</option>
<option>Sofá carina braço reto pilow de 15</option>
<option>Sofá carina braço reto pilow de 25</option>
</select>

<label>Tamanho do Sofá</label>
<input id="tamanho" required>

<label>Cor</label>
<input id="cor" required>

<label>Valor do Sofá</label>
<input id="valorSofa" required>

<label>Frete</label>
<input id="frete" value="0">

<label>Valor da Montagem</label>
<input id="valorMontagem" value="0">

<label>Total</label>
<input id="total" disabled>

<hr>

<label>Forma de Pagamento</label>
<select id="pagamento" required>
<option value="">Selecione</option>
<option value="avista">À vista</option>
<option value="dinheiro">Dinheiro</option>
<option value="pix">Pix</option>
<option value="prazo">A prazo</option>
</select>

<div class="parcelas" id="parcelas"></div>

<hr>

<input placeholder="Nome do Cliente" id="nomeCliente" required>
<input placeholder="Contato" id="contato" required>

<input placeholder="CEP" id="cep" required>
<input placeholder="Rua" id="rua">
<input placeholder="Número" id="numero">
<input placeholder="Bairro" id="bairro">
<input placeholder="Município" id="cidade">
  
  <label>Zona</label>
<select id="zona" required>
  <option value="">Selecione</option>
  <option value="centro">Centro</option>
  <option value="zona_norte">Zona Norte</option>
  <option value="zona_sul">Zona Sul</option>
  <option value="zona_leste">Zona Leste</option>
  <option value="zona_oeste">Zona Oeste</option>
  <option value="abc_paulista">ABC Paulista</option>
  <option value="litoral_sul">Litoral Sul</option>
<option value="litoral_norte">Litoral Norte</option>
<option value="sudoeste">Sudoeste</option>
<option value="interior">Interior</option>
</select>

<textarea placeholder="Observações" id="obs"></textarea>

<button type="submit">Salvar Venda</button>
</form>

<button onclick="location.href='minhas-vendas.html'">
Ver Minhas Vendas
</button>

<button id="btnSair">Sair</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBlB4NN_lTrWv4sJ1PKp2m0YjoVADnIeHk",
  authDomain: "crm-vendas-43b6b.firebaseapp.com",
  projectId: "crm-vendas-43b6b",
  storageBucket: "crm-vendas-43b6b.appspot.com",
  messagingSenderId: "645002761099",
  appId: "1:645002761099:web:f194f70c351d1074ac158e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let vendedor = {};
let parcelaSelecionada = null;

onAuthStateChanged(auth, user=>{
  if(!user){
    location.href="login.html";
    return;
  }

  vendedor.nome = user.displayName;
  vendedor.email = user.email;

});

pedido.value = Date.now();
dataPedido.valueAsDate = new Date();

function moeda(i){
  let v=i.value.replace(/\D/g,"");
  v=(v/100).toFixed(2);
  v=v.replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");
  i.value="R$ "+v;
  totalizar();
}
function limpar(v){ return Number(v.replace(/\D/g,""))/100||0; }
function totalizar(){
  total.value=(limpar(valorSofa.value)+limpar(frete.value)+(montagem.checked?limpar(valorMontagem.value):0))
  .toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}
valorSofa.oninput=()=>moeda(valorSofa);
frete.oninput=()=>moeda(frete);
valorMontagem.oninput=()=>moeda(valorMontagem);
montagem.onchange=totalizar;

pagamento.onchange=()=>{
  parcelas.innerHTML="";
  parcelaSelecionada=null;
  if(pagamento.value==="prazo"){
    parcelas.style.display="flex";
    for(let i=1;i<=12;i++){
      const b=document.createElement("button");
      b.type="button";
      b.textContent=i+"x";
      b.onclick=()=>{
        document.querySelectorAll(".parcelas button").forEach(x=>x.classList.remove("ativa"));
        b.classList.add("ativa");
        parcelaSelecionada=i;
      };
      parcelas.appendChild(b);
    }
  } else {
    parcelas.style.display="none";
  }
};

async function buscarCepBrasilAPI(cepNum){
  const resp = await fetch(`https://brasilapi.com.br/api/cep/v1/${cepNum}`);
  if (!resp.ok) throw new Error("BrasilAPI falhou");
  return await resp.json();
}

function buscarCepViaCepJsonp(cepNum) {
  return new Promise((resolve, reject) => {
    const callbackName = "viacep_cb_" + Date.now();

    window[callbackName] = (data) => {
      try { delete window[callbackName]; } catch(e){}
      script.remove();
      resolve(data);
    };

    const script = document.createElement("script");
    script.src = `https://viacep.com.br/ws/${cepNum}/json/?callback=${callbackName}`;

    script.onerror = () => {
      try { delete window[callbackName]; } catch(e){}
      script.remove();
      reject(new Error("ViaCEP (JSONP) falhou ao carregar"));
    };

    document.body.appendChild(script);
  });
}

async function buscarCep(cepNum){
  // 1) tenta BrasilAPI
  try{
    const r = await buscarCepBrasilAPI(cepNum);
    return {
      logradouro: r.street || "",
      bairro: r.neighborhood || "",
      localidade: r.city || ""
    };
  }catch(e){
    // 2) fallback ViaCEP JSONP
    const r = await buscarCepViaCepJsonp(cepNum);
    if (!r || r.erro) throw new Error("CEP não encontrado");
    return {
      logradouro: r.logradouro || "",
      bairro: r.bairro || "",
      localidade: r.localidade || ""
    };
  }
}

cep.onblur = async () => {
  const c = cep.value.replace(/\D/g, "");
  if (c.length !== 8) return;

  try {
    const r = await buscarCep(c);

    rua.value = r.logradouro;
    bairro.value = r.bairro;
    cidade.value = r.localidade;
  } catch (e) {
    console.error(e);
    alert("Não foi possível buscar o CEP agora. Tente novamente.");
  }
};

formVenda.onsubmit=async e=>{
  e.preventDefault();
  if(pagamento.value==="prazo" && !parcelaSelecionada){
    alert("Selecione a quantidade de parcelas");
    return;
  }

  await addDoc(collection(db,"vendas"),{
    pedido:pedido.value,
    status:"ativa", // 🔥 ALTERADO AQUI
    vendedorNome:vendedor.nome,
    vendedorEmail:vendedor.email,
    dataPedido:dataPedido.value,
    dataEntrega:dataEntrega.value,
    produto:{
      modelo:modelo.value,
      tamanho:tamanho.value,
      cor:cor.value,
      valor:limpar(valorSofa.value)
    },
     frete: limpar(frete.value),
     montagem: montagem.checked ?
       limpar(valorMontagem.value) : 0,
    
    pagamento:{
      tipo:pagamento.value,
      parcelas:parcelaSelecionada
    },
    total:limpar(total.value),
    cliente:{
      nome:nomeCliente.value,
      contato:contato.value,
      cep:cep.value,
      rua:rua.value,
      numero:numero.value,
      bairro:bairro.value,
      cidade:cidade.value
    },
    zona: zona.value,
    observacoes:obs.value
  });

  alert("Venda salva");
  location.reload();
};

btnSair.onclick=async()=>{
  await signOut(auth);
  location.href="login.html";
};
</script>

</body>
</html>
